spring:
  application:
    name: medisalud-api
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

management:
  endpoints:
    web:
      exposure:
        include: health
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never

medisalud:
  zona-horaria: America/Bogota
  festivos: []
  maximo-dias-disponibilidad: ${MEDISALUD_MAXIMO_DIAS_DISPONIBILIDAD:90}
  maximo-tamanio-pagina-citas: ${MEDISALUD_MAXIMO_TAMANIO_PAGINA_CITAS:100}
