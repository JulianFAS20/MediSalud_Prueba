spring:
  application:
    name: medisalud-api
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

medisalud:
  zona-horaria: America/Bogota
  festivos: []
