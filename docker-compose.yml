services:
  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: ${DB_NAME:-medisalud}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME debe definirse en .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD debe definirse en .env}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - medisalud-postgres:/var/lib/postgresql/data

  api:
    build: .
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-medisalud}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME debe definirse en .env}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD debe definirse en .env}
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8080:8080"

volumes:
  medisalud-postgres:
